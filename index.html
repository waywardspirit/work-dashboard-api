<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SEO Intelligence Hub</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fafaf8; color: #1a1a1a; min-height: 100vh; }
.container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
.top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
.top-bar h1 { font-size: 20px; font-weight: 500; }
.last-updated { font-size: 12px; color: #999; }
.config-bar { background: #f0efec; border-radius: 10px; padding: 10px 14px; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.config-label { font-size: 12px; color: #666; white-space: nowrap; }
.config-input { font-size: 12px; padding: 5px 9px; border-radius: 8px; border: 0.5px solid #ddd; background: #fff; color: #1a1a1a; }
.config-input:focus { outline: none; border-color: #999; }
.btn-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.sync-btn { font-size: 12px; padding: 6px 16px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; color: #1a1a1a; cursor: pointer; white-space: nowrap; }
.sync-btn:hover { background: #f0efec; }
.sync-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.reset-btn { font-size: 11px; padding: 5px 10px; border-radius: 8px; border: 0.5px solid #e0e0db; background: transparent; color: #aaa; cursor: pointer; }
.reset-btn:hover { color: #666; border-color: #ccc; }
.status { font-size: 12px; color: #999; }
.metrics { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; margin-bottom: 1.5rem; }
.metric { background: #f0efec; border-radius: 8px; padding: 12px 14px; }
.metric-label { font-size: 11px; color: #888; margin-bottom: 4px; }
.metric-value { font-size: 22px; font-weight: 500; }
.metric-sub { font-size: 11px; color: #aaa; margin-top: 2px; }
.context-tabs { display: flex; border-bottom: 0.5px solid #e8e8e5; margin-bottom: 1.5rem; overflow-x: auto; }
.ctx-tab { font-size: 13px; padding: 8px 18px; cursor: pointer; color: #888; border-bottom: 2px solid transparent; margin-bottom: -0.5px; white-space: nowrap; }
.ctx-tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; font-weight: 500; }
.ctx-tab:hover:not(.active) { color: #1a1a1a; }
.ctx-tab .ct { font-size: 11px; color: #bbb; margin-left: 4px; }
.ctx-view { display: none; }
.ctx-view.active { display: block; }
.section-tabs { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }
.sec-tab { font-size: 12px; padding: 5px 12px; border-radius: 20px; cursor: pointer; border: 0.5px solid #e0e0db; color: #888; background: transparent; }
.sec-tab.active { background: #f0efec; color: #1a1a1a; border-color: #ccc; }
.sec-view { display: none; }
.sec-view.active { display: block; }
.card { background: #fff; border: 0.5px solid #e8e8e5; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 12px; }
.card-title { font-size: 11px; font-weight: 500; color: #999; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 1rem; }
.insight-item { padding: 10px 0; border-bottom: 0.5px solid #f0efec; }
.insight-item:last-child { border-bottom: none; }
.tag { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 20px; margin-bottom: 4px; }
.tag-pattern { background: #e6f1fb; color: #185fa5; }
.tag-action { background: #faeeda; color: #854f0b; }
.tag-opportunity { background: #eaf3de; color: #3b6d11; }
.tag-followup { background: #fcebeb; color: #a32d2d; }
.tag-blocker { background: #fbeaf0; color: #993556; }
.insight-text { font-size: 13px; line-height: 1.5; }
.insight-meta { font-size: 11px; color: #aaa; margin-top: 3px; }
.priority-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid #f0efec; align-items: flex-start; }
.priority-item:last-child { border-bottom: none; }
.priority-num { width: 22px; height: 22px; border-radius: 50%; background: #f0efec; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: #888; flex-shrink: 0; margin-top: 1px; }
.priority-title { font-size: 13px; font-weight: 500; }
.priority-desc { font-size: 12px; color: #666; margin-top: 2px; line-height: 1.4; }
.action-item { display: flex; gap: 8px; padding: 8px 0; border-bottom: 0.5px solid #f0efec; align-items: flex-start; }
.action-item:last-child { border-bottom: none; }
.action-dot { width: 6px; height: 6px; border-radius: 50%; background: #ccc; flex-shrink: 0; margin-top: 5px; }
.action-dot.urgent { background: #e24b4a; }
.action-text { font-size: 13px; line-height: 1.4; }
.action-owner { font-size: 11px; color: #aaa; margin-top: 2px; }
.recap-section { margin-bottom: 14px; }
.recap-label { font-size: 11px; font-weight: 500; color: #999; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
.recap-text { font-size: 13px; line-height: 1.6; color: #333; }
.upload-zone { border: 0.5px dashed #ccc; border-radius: 12px; padding: 2rem; text-align: center; margin-bottom: 12px; cursor: pointer; }
.upload-zone:hover { background: #f0efec; }
.upload-label { font-size: 13px; color: #666; }
.upload-sub { font-size: 11px; color: #aaa; margin-top: 4px; }
.uploaded-files { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.file-pill { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #f0efec; color: #666; border: 0.5px solid #e0e0db; display: flex; align-items: center; gap: 5px; }
.file-pill button { background: none; border: none; cursor: pointer; color: #aaa; font-size: 13px; padding: 0; line-height: 1; }
.empty { font-size: 13px; color: #aaa; padding: 1rem 0; }
.bottom-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; margin-bottom: 1rem; }
.bottom-btn { font-size: 12px; padding: 6px 12px; border-radius: 8px; border: 0.5px solid #e0e0db; background: transparent; color: #666; cursor: pointer; }
.bottom-btn:hover { background: #f0efec; color: #1a1a1a; }
.analyze-btn { font-size: 12px; padding: 6px 16px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; color: #1a1a1a; cursor: pointer; margin-bottom: 12px; }
.analyze-btn:hover { background: #f0efec; }
.file-result { font-size: 13px; line-height: 1.7; color: #333; white-space: pre-wrap; }
.new-badge { font-size: 10px; background: #eaf3de; color: #3b6d11; padding: 1px 6px; border-radius: 10px; margin-left: 6px; }
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <h1>SEO Intelligence Hub</h1>
    <span class="last-updated" id="last-updated">Not yet synced</span>
  </div>

  <div class="config-bar">
    <span class="config-label">Vercel URL</span>
    <input class="config-input" id="vercel-url" value="work-dashboard-api.vercel.app" style="width:200px;" />
    <span class="config-label">DB ID</span>
    <input class="config-input" id="db-id" value="332cd826f06481e88061c7e526648e67" style="width:230px;" />
    <div class="btn-row">
      <button class="sync-btn" id="sync-btn" onclick="loadAndAnalyze(false)">Sync new notes</button>
      <button class="reset-btn" onclick="loadAndAnalyze(true)">Full re-sync</button>
      <span class="status" id="status"></span>
    </div>
  </div>

  <div class="metrics">
    <div class="metric"><div class="metric-label">Total notes</div><div class="metric-value" id="m-total">—</div><div class="metric-sub">all contexts</div></div>
    <div class="metric"><div class="metric-label">New this sync</div><div class="metric-value" id="m-new">—</div><div class="metric-sub">notes processed</div></div>
    <div class="metric"><div class="metric-label">Action items</div><div class="metric-value" id="m-actions">—</div><div class="metric-sub">for Bex</div></div>
    <div class="metric"><div class="metric-label">Insights</div><div class="metric-value" id="m-insights">—</div><div class="metric-sub">this sync</div></div>
  </div>

  <div class="context-tabs" id="context-tabs">
    <div class="ctx-tab active" onclick="switchContext('files', this)" data-ctx="files">Uploaded files</div>
  </div>

  <div id="ctx-files" class="ctx-view active">
    <div class="upload-zone" onclick="document.getElementById('file-input').click()">
      <input type="file" id="file-input" style="display:none;" multiple accept=".csv,.pdf,.txt,.xlsx" onchange="handleFiles(this.files)" />
      <div class="upload-label">Click to upload files</div>
      <div class="upload-sub">GSC exports, SEMrush reports, ranking files, strategy docs</div>
    </div>
    <div class="uploaded-files" id="uploaded-files"></div>
    <button class="analyze-btn" id="analyze-btn" style="display:none;" onclick="analyzeFiles()">Analyze uploaded files</button>
    <div class="card" id="file-card" style="display:none;">
      <div class="card-title">File analysis</div>
      <div id="file-result"><div class="empty">Upload files and hit analyze.</div></div>
    </div>
    <div class="bottom-btns">
      <button class="bottom-btn" onclick="window.open('https://claude.ai','_blank')">Cross-reference with notes</button>
    </div>
  </div>
</div>

<script>
var CLAUDE_API = '/api/claude';
var uploadedFileData = [];
var allNotesByContext = {};
var STORAGE_KEY = 'seo_hub_cache';

var CONTEXT_SECTIONS = {
  default: ['insights','priorities','actions','recap'],
  'UC Davis': ['actions'],
  'Personal': ['insights','priorities','recap']
};

var SECTION_LABELS = {
  insights: 'Insights + patterns',
  priorities: 'This week',
  actions: 'Follow-ups',
  recap: 'Week recap'
};

function getSections(ctx) {
  return CONTEXT_SECTIONS[ctx] || CONTEXT_SECTIONS.default;
}

function getCache() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { return {}; }
}

function saveCache(cache) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(cache)); } catch(e) {}
}

function cssId(str) {
  return str.toLowerCase().replace(/[^a-z0-9]/g, '_');
}

function switchContext(name, el) {
  document.querySelectorAll('.ctx-tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.ctx-view').forEach(function(v) { v.classList.remove('active'); });
  el.classList.add('active');
  document.getElementById('ctx-' + cssId(name)).classList.add('active');
}

function switchSection(ctxSafe, secName, el) {
  var parent = el.closest('.ctx-view');
  parent.querySelectorAll('.sec-tab').forEach(function(t) { t.classList.remove('active'); });
  parent.querySelectorAll('.sec-view').forEach(function(v) { v.classList.remove('active'); });
  el.classList.add('active');
  document.getElementById(ctxSafe + '_' + secName).classList.add('active');
}

function buildContextTab(ctx, count, isNew) {
  var safe = cssId(ctx);
  var sections = getSections(ctx);
  var existing = document.querySelector('[data-ctx="' + ctx + '"]');
  if (existing) {
    existing.innerHTML = ctx + ' <span class="ct">(' + count + ')</span>' + (isNew ? '<span class="new-badge">updated</span>' : '');
    return;
  }

  var tabEl = document.createElement('div');
  tabEl.className = 'ctx-tab';
  tabEl.setAttribute('data-ctx', ctx);
  tabEl.innerHTML = ctx + ' <span class="ct">(' + count + ')</span>' + (isNew ? '<span class="new-badge">updated</span>' : '');
  tabEl.onclick = function() { switchContext(ctx, tabEl); };

  var secTabsHtml = sections.map(function(s, i) {
    return '<div class="sec-tab ' + (i===0?'active':'') + '" onclick="switchSection(\'' + safe + '\',\'' + s + '\',this)">' + SECTION_LABELS[s] + '</div>';
  }).join('');

  var secViewsHtml = sections.map(function(s, i) {
    return '<div id="' + safe + '_' + s + '" class="sec-view ' + (i===0?'active':'') + '"><div class="card"><div class="card-title">' + SECTION_LABELS[s] + '</div><div id="' + safe + '_' + s + '_content"><div class="empty">Loading...</div></div></div></div>';
  }).join('');

  var viewEl = document.createElement('div');
  viewEl.id = 'ctx-' + safe;
  viewEl.className = 'ctx-view';
  viewEl.innerHTML = '<div class="section-tabs">' + secTabsHtml + '</div>' + secViewsHtml +
    '<div class="bottom-btns"><button class="bottom-btn" onclick="window.open(\'https://claude.ai\',\'_blank\')">Dig deeper in Claude</button></div>';

  var tabsContainer = document.getElementById('context-tabs');
  tabsContainer.insertBefore(tabEl, tabsContainer.querySelector('[data-ctx="files"]'));
  document.querySelector('.container').insertBefore(viewEl, document.getElementById('ctx-files'));
}

function renderInsights(items) {
  if (!items || !items.length) return '<div class="empty">No insights found.</div>';
  return items.map(function(i) {
    return '<div class="insight-item"><span class="tag tag-' + (i.tag||'pattern') + '">' + (i.tag||'pattern') + '</span><div class="insight-text">' + i.text + '</div><div class="insight-meta">' + (i.meta||'') + '</div></div>';
  }).join('');
}

function renderPriorities(items) {
  if (!items || !items.length) return '<div class="empty">No priorities found.</div>';
  return items.map(function(p, i) {
    return '<div class="priority-item"><div class="priority-num">' + (i+1) + '</div><div><div class="priority-title">' + p.title + '</div><div class="priority-desc">' + p.desc + '</div></div></div>';
  }).join('');
}

function renderActions(items) {
  if (!items || !items.length) return '<div class="empty">No items found.</div>';
  return items.map(function(a) {
    return '<div class="action-item"><div class="action-dot ' + (a.urgent?'urgent':'') + '"></div><div><div class="action-text">' + a.text + '</div><div class="action-owner">' + (a.owner||'') + '</div></div></div>';
  }).join('');
}

function renderRecap(r) {
  if (!r) return '<div class="empty">No recap available.</div>';
  return '<div class="recap-section"><div class="recap-label">Wins</div><div class="recap-text">' + r.wins + '</div></div>' +
    '<div class="recap-section"><div class="recap-label">Things to watch</div><div class="recap-text">' + r.concerns + '</div></div>' +
    '<div class="recap-section"><div class="recap-label">Going into next week</div><div class="recap-text">' + r.next_week + '</div></div>';
}

function populateSection(safe, secName, analysis) {
  var el = document.getElementById(safe + '_' + secName + '_content');
  if (!el) return;
  if (secName === 'insights') el.innerHTML = renderInsights(analysis.insights);
  else if (secName === 'priorities') el.innerHTML = renderPriorities(analysis.priorities);
  else if (secName === 'actions') el.innerHTML = renderActions(analysis.followups);
  else if (secName === 'recap') el.innerHTML = renderRecap(analysis.recap);
}

function safeParseJSON(text) {
  var cleaned = text.replace(/```json|```/g,'').trim();
  try { return JSON.parse(cleaned); } catch(e) {}
  var match = cleaned.match(/\{[\s\S]*\}/);
  if (match) { try { return JSON.parse(match[0]); } catch(e2) {} }
  return null;
}

async function analyzeNotes(notes, ctx) {
  if (!notes.length) return null;
  var today = new Date().toLocaleDateString('en-GB', {weekday:'long',year:'numeric',month:'long',day:'numeric'});
  var notesText = notes.slice(0,5).map(function(n, i) {
    return 'Meeting ' + (i+1) + ': ' + n.title + ' (' + n.date + ')\n' + (n.content||'').slice(0,2000);
  }).join('\n\n---\n\n');

  var systemPrompt = 'You are a strategic intelligence assistant for Bex (Senior International Web Strategist, SEO contractor at ' + ctx + '). Today: ' + today + '.\n' +
  'Analyze these meeting notes and produce TWO types of output:\n\n' +
  '1. INSIGHTS: Connect dots across multiple meetings to surface non-obvious findings. Each insight must have:\n' +
  '   - A specific observation with evidence from the notes\n' +
  '   - Why it matters for Bex\'s work specifically\n' +
  '   - The implication or risk if unaddressed\n' +
  '   Example: "International scope is being planned around a US product that hasn\'t launched yet. If the US May launch slips, international planning becomes wasted work."\n\n' +
  '2. PATTERNS: Recurring themes appearing across 2+ meetings that are growing in urgency.\n' +
  '   Each pattern must cite specific evidence from multiple meetings.\n\n' +
  'Action items: ONLY tasks assigned to Bex, May, or Rebecca by name, OR unowned SEO/international/web strategy tasks.\n' +
  'Followups: specific people Bex needs to contact with exact context why.\n' +
  'Priorities: Bex\'s top 3 this week based on deadlines and blockers mentioned.\n' +
  'Do NOT summarize meetings. Do NOT surface other people\'s tasks. Be specific.\n' +
  'Return ONLY this JSON:\n' +
  '{"insights":[{"tag":"insight","text":"...","meta":"evidence + why it matters"}],"priorities":[{"title":"...","desc":"..."}],"followups":[{"text":"...","owner":"...","urgent":false}],"recap":{"wins":"...","concerns":"...","next_week":"..."}}';

  var res = await fetch(CLAUDE_API, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1500,
      system: systemPrompt,
      messages: [{role:'user', content:'Analyze for Bex only:\n\n' + notesText}]
    })
  });
  var data = await res.json();
  var text = (data.content||[]).filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('');
  return safeParseJSON(text);
}

function restoreFromCache() {
  var cache = getCache();
  if (!Object.keys(cache.analyses||{}).length) return false;
  var contexts = Object.keys(cache.analyses);
  contexts.forEach(function(ctx) {
    var count = (cache.noteCounts||{})[ctx] || 0;
    buildContextTab(ctx, count, false);
  });
  if (contexts.length > 0) {
    var firstTab = document.querySelector('.ctx-tab:not([data-ctx="files"])');
    if (firstTab) {
      firstTab.classList.add('active');
      document.getElementById('ctx-' + cssId(contexts[0])).classList.add('active');
    }
  }
  contexts.forEach(function(ctx) {
    var safe = cssId(ctx);
    var analysis = cache.analyses[ctx];
    getSections(ctx).forEach(function(sec) { populateSection(safe, sec, analysis); });
  });
  document.getElementById('m-total').textContent = cache.totalNotes || '—';
  document.getElementById('m-new').textContent = '0';
  document.getElementById('m-actions').textContent = cache.totalActions || '—';
  document.getElementById('m-insights').textContent = cache.totalInsights || '—';
  document.getElementById('last-updated').textContent = 'Cached: ' + (cache.lastSync || 'unknown');
  document.getElementById('status').textContent = 'Showing cached results. Hit sync for new notes.';
  return true;
}

async function loadAndAnalyze(fullResync) {
  var vercelUrl = document.getElementById('vercel-url').value.trim().replace(/^https?:\/\//,'');
  var dbId = document.getElementById('db-id').value.trim();
  var status = document.getElementById('status');
  var btn = document.getElementById('sync-btn');
  btn.disabled = true;

  if (fullResync) {
    localStorage.removeItem(STORAGE_KEY);
    document.querySelectorAll('.ctx-tab:not([data-ctx="files"])').forEach(function(t){t.remove();});
    document.querySelectorAll('.ctx-view:not(#ctx-files)').forEach(function(v){v.remove();});
  }

  var cache = getCache();
  var lastSyncDate = fullResync ? null : (cache.lastNoteDate || null);
  status.textContent = 'Fetching notes' + (lastSyncDate ? ' since ' + lastSyncDate.slice(0,10) : '') + '...';

  try {
    var url = 'https://' + vercelUrl + '/api/notion?dbId=' + dbId;
    if (lastSyncDate) url += '&since=' + encodeURIComponent(lastSyncDate);
    var res = await fetch(url);
    if (!res.ok) throw new Error('API error ' + res.status);
    var data = await res.json();
    var allNotes = data.results || [];

    var newNotes = lastSyncDate ? allNotes.filter(function(n) { return n.date > lastSyncDate; }) : allNotes;

    document.getElementById('m-total').textContent = allNotes.length;
    document.getElementById('m-new').textContent = newNotes.length;

    if (!newNotes.length) {
      status.textContent = 'No new notes since last sync.';
      btn.disabled = false;
      restoreFromCache();
      return;
    }

    var byContext = {};
    newNotes.forEach(function(n) {
      if (!byContext[n.context]) byContext[n.context] = [];
      byContext[n.context].push(n);
    });

    var contexts = Object.keys(byContext);
    var cachedAnalyses = cache.analyses || {};
    var cachedCounts = cache.noteCounts || {};
    var totalActions = 0, totalInsights = 0;

    allNotes.forEach(function(n) {
      if (!cachedCounts[n.context]) cachedCounts[n.context] = 0;
    });
    Object.keys(byContext).forEach(function(ctx) {
      cachedCounts[ctx] = (cachedCounts[ctx] || 0) + byContext[ctx].length;
    });

    var allContexts = Object.keys(cachedCounts);
    allContexts.forEach(function(ctx) { buildContextTab(ctx, cachedCounts[ctx], !!byContext[ctx]); });

    if (!document.querySelector('.ctx-tab:not([data-ctx="files"]).active')) {
      var firstTab = document.querySelector('.ctx-tab:not([data-ctx="files"])');
      if (firstTab) {
        firstTab.classList.add('active');
        document.getElementById('ctx-' + cssId(allContexts[0])).classList.add('active');
      }
    }

    status.textContent = newNotes.length + ' new notes, analyzing...';

    for (var i = 0; i < contexts.length; i++) {
      var ctx = contexts[i];
      var analysis = await analyzeNotes(byContext[ctx], ctx);
      if (analysis) {
        cachedAnalyses[ctx] = analysis;
        var safe = cssId(ctx);
        getSections(ctx).forEach(function(sec) { populateSection(safe, sec, analysis); });
        totalActions += (analysis.followups||[]).length;
        totalInsights += (analysis.insights||[]).length;
      }
    }

    var allContextsWithCache = Object.keys(cachedAnalyses);
    allContextsWithCache.forEach(function(ctx) {
      if (!byContext[ctx]) {
        var safe = cssId(ctx);
        var analysis = cachedAnalyses[ctx];
        getSections(ctx).forEach(function(sec) { populateSection(safe, sec, analysis); });
        totalActions += (analysis.followups||[]).length;
        totalInsights += (analysis.insights||[]).length;
      }
    });

    var latestDate = newNotes.reduce(function(max, n) { return n.date > max ? n.date : max; }, '');
    var newCache = {
      analyses: cachedAnalyses,
      noteCounts: cachedCounts,
      lastNoteDate: latestDate || lastSyncDate,
      lastSync: new Date().toLocaleTimeString(),
      totalNotes: allNotes.length,
      totalActions: totalActions,
      totalInsights: totalInsights
    };
    saveCache(newCache);

    document.getElementById('m-actions').textContent = totalActions || '—';
    document.getElementById('m-insights').textContent = totalInsights || '—';
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
    status.textContent = newNotes.length + ' new notes analyzed.';
  } catch(e) {
    status.textContent = 'Error: ' + e.message;
    document.querySelector('[data-ctx="files"]').classList.add('active');
    document.getElementById('ctx-files').classList.add('active');
  }
  btn.disabled = false;
}

function handleFiles(files) {
  for (var i = 0; i < files.length; i++) {
    (function(file) {
      var reader = new FileReader();
      reader.onload = function(e) {
        uploadedFileData.push({name:file.name, content:e.target.result.slice(0,4000)});
        renderFilePills();
      };
      reader.readAsText(file);
    })(files[i]);
  }
}

function renderFilePills() {
  document.getElementById('uploaded-files').innerHTML = uploadedFileData.map(function(f,i) {
    return '<div class="file-pill">' + f.name + '<button onclick="removeFile(' + i + ')">×</button></div>';
  }).join('');
  document.getElementById('analyze-btn').style.display = uploadedFileData.length ? 'inline-block' : 'none';
  document.getElementById('file-card').style.display = uploadedFileData.length ? 'block' : 'none';
}

function removeFile(i) { uploadedFileData.splice(i,1); renderFilePills(); }

async function analyzeFiles() {
  document.getElementById('file-result').innerHTML = '<div class="empty">Analyzing...</div>';
  var filesText = uploadedFileData.map(function(f) { return 'File: ' + f.name + '\n' + f.content; }).join('\n\n---\n\n');
  var res = await fetch(CLAUDE_API, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 2000,
      system: 'You are an SEO analyst for Bex, a Senior International Web Strategist. Analyze these files and return specific insights, trends, and recommended actions relevant to her work. Be direct and actionable.',
      messages: [{role:'user', content:'Analyze:\n\n' + filesText}]
    })
  });
  var data = await res.json();
  var text = (data.content||[]).filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('');
  document.getElementById('file-result').innerHTML = '<div class="file-result">' + text + '</div>';
}

window.onload = function() { restoreFromCache(); };
</script>
</body>
</html>
